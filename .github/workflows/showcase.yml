name: showcase

# Gated live-agent showcase (GDD §10/§11, backlog 06). Unlike ci.yml — which is
# hermetic — this job plays a real LLM agent through the engine. It runs on
# workflow_dispatch ONLY, never on push or pull_request.
#
# By default it uses GitHub Models (https://models.github.ai) — a free,
# OpenAI-compatible inference API authenticated by the built-in GITHUB_TOKEN via
# `permissions: models: read`. So NO external secret is needed and there is no
# per-token bill; the free tier is rate-limited, which is fine for an occasional
# best-of-3. (GitHub Models must be enabled for the account/org — Settings →
# Models. To use Anthropic instead, see CONTRIBUTING.md → "Live showcase".)
#
# The job plays best-of-3 episodes and is ALLOWED TO FLAKE: a loss, a model
# hiccup, or a rate-limit is not a red build (each episode runs under `|| true`).
# The deliverable is the uploaded post-mortem — replay + death report — the raw
# material for the multi-model results post (GDD §11).

on:
  workflow_dispatch:
    inputs:
      model:
        description: "GitHub Models model id for the player agent (publisher/name)"
        required: false
        default: "openai/gpt-4o-mini"

permissions:
  contents: read
  models: read

jobs:
  showcase:
    runs-on: ubuntu-latest
    # Hard wall-clock backstop for the whole job. The per-round --deadline and
    # --max-rounds bound a SINGLE episode, but with an in-character prompt the
    # agent no longer wins early (it runs every round), and the free GitHub
    # Models tier throttles, so three episodes can crawl. This cap guarantees
    # the job can never run away, whatever the model or rate limit does.
    timeout-minutes: 15
    env:
      # The built-in token; `permissions: models: read` grants it GitHub Models
      # inference access. No repository secret required.
      GITHUB_TOKEN: ${{ github.token }}
      MODEL: ${{ inputs.model }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build ./...

      # Best-of-3: play three episodes on distinct seeds (0 is the canonical
      # death world). Each is allowed to flake (|| true). cmd/run hosts the
      # engine and drives the LLM agent, which routes every model reply through
      # the quarantined parser; misparses become free waits, never deaths (P3).
      #
      # Bounds (three layers, tightest first):
      #   --deadline 45s   per-round wall clock; a slow model call becomes a wait
      #   --max-rounds 25  caps rounds/requests per episode. An in-character
      #                    agent no longer wins early, so it uses all of them —
      #                    keep this modest so the episode finishes (and writes
      #                    its replay) and to stay gentle on the free-tier limit.
      #   timeout 300s     per-episode kill switch for a pathological rate-limit
      #                    stall; --preserve-status + || true so it is never a
      #                    red build. (The job-level timeout-minutes is the last
      #                    resort above this.)
      - name: Play best-of-3
        run: |
          for seed in 0 1 2; do
            dir="artifacts/episode-${seed}"
            mkdir -p "${dir}"
            echo "::group::episode seed=${seed}"
            timeout --preserve-status --kill-after=15s 300s \
              go run ./cmd/run \
                --agent "go run ./agent/llm --provider github-models --model ${MODEL} --report ${dir}/death_report.json" \
                --seed "${seed}" \
                --bracket "llm" \
                --deadline 45s \
                --max-rounds 25 \
                --out "${dir}/replay.json" || true
            echo "::endgroup::"
          done
          echo "--- artifacts produced ---"
          find artifacts -type f -print

      # The post-mortem is the deliverable and the publicity material (GDD §11):
      # every replay + death report is uploaded.
      - name: Upload replays and death reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: showcase-post-mortem
          path: artifacts/**
          if-no-files-found: warn
