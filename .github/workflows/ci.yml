name: ci

on:
  push:
    branches: ["**"]
  pull_request:

# Hermetic, zero-token engine CI (ADR-000 D5, GDD §10).
jobs:
  # Build + test on an OS matrix. Because the golden state hash is committed and
  # asserted equal on every OS, a green matrix is the cross-platform
  # determinism proof (ADR-000 D5 CI enforcement (a)(b)).
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # This is a pure-Go, zero-dependency project — cgo buys it nothing. Disabling
    # it forces internal linking so the build is identical across OSes and avoids
    # the macOS arm64 external-linker "missing LC_UUID" dyld abort on binaries
    # that import net/http (agent/llm). Hashes are SHA-256 over canonical bytes,
    # so linking mode never affects the determinism proof.
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  # Determinism: replay the golden log twice, in separate processes, and assert
  # the reproduced state hashes are byte-identical (ADR-000 D6).
  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Replay golden log twice and compare hashes
        shell: bash
        run: |
          H1="$(go run ./scripts/verifygolden)"
          H2="$(go run ./scripts/verifygolden)"
          echo "run 1: $H1"
          echo "run 2: $H2"
          if [ "$H1" != "$H2" ]; then
            echo "determinism FAIL: golden replay hashes differ between runs"
            exit 1
          fi
          echo "determinism OK: golden replay reproduced identically"

      # The runner is the harness that produces the replay (ADR-000 D6): drive
      # the scripted agent through cmd/run and assert its emitted replay is the
      # committed determinism fixture, byte for byte.
      - name: Runner emits the committed determinism fixture
        shell: bash
        run: |
          go run ./cmd/run --agent "go run ./agent/scripted/main" --seed 1 --out /tmp/runner_replay.json
          if ! diff agent/scripted/testdata/golden_replay.json /tmp/runner_replay.json; then
            echo "determinism FAIL: cmd/run replay differs from the committed golden"
            exit 1
          fi
          echo "determinism OK: cmd/run reproduced the committed golden replay"

  # Guard: fail if math/rand, time., float32, or float64 appear under /engine
  # (ADR-000 D5 CI enforcement (c)), and if the engine imports the quarantined
  # parser (ADR-000 D3/D4 — the parser must stay off the replay path).
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Determinism lint guard
        shell: bash
        run: ./scripts/check-determinism.sh
      - name: Parser quarantine guard
        shell: bash
        run: ./scripts/check-engine-imports.sh
