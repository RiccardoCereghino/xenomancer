name: repo-sync

# Backlog-as-code: labels, milestones, and seed issues are declared as files in
# .github/ and reconciled into the repo on merge to main. The whole script is
# idempotent by construction — it upserts labels, ensures milestones by title,
# and creates a backlog issue only when no open/closed issue already has that
# exact title. No third-party actions; curl against the REST API only.
on:
  push:
    branches: [main]
    paths:
      - ".github/labels.json"
      - ".github/backlog/**"

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reconcile labels, milestones, and backlog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          API: ${{ github.api_url }}
        shell: bash
        run: |
          set -euo pipefail

          # --- REST helpers -------------------------------------------------
          # api_req METHOD PATH [JSON_BODY] -> sets globals HTTP_CODE and BODY.
          api_req() {
            local method="$1" path="$2" data="${3:-}"
            local args=(-sS -w $'\n%{http_code}' -X "$method"
              -H "Authorization: Bearer $GH_TOKEN"
              -H "Accept: application/vnd.github+json"
              -H "X-GitHub-Api-Version: 2022-11-28")
            [ -n "$data" ] && args+=(-d "$data")
            local resp
            resp="$(curl "${args[@]}" "$API/repos/$REPO$path")"
            HTTP_CODE="${resp##*$'\n'}"
            BODY="${resp%$'\n'*}"
          }

          # api_get_all PATH -> prints a single concatenated JSON array across
          # all pages (per_page=100), stopping on the first short page.
          api_get_all() {
            local path="$1" page=1 acc='[]' sep count
            sep='?'; [[ "$path" == *'?'* ]] && sep='&'
            while :; do
              api_req GET "${path}${sep}per_page=100&page=${page}"
              count="$(jq 'length' <<<"$BODY")"
              acc="$(jq -c --argjson a "$acc" --argjson b "$BODY" -n '$a + $b')"
              [ "$count" -lt 100 ] && break
              page=$((page + 1))
            done
            printf '%s' "$acc"
          }

          # --- (a) Labels: upsert idempotently ------------------------------
          echo "== Labels =="
          jq -c '.[]' .github/labels.json | while read -r label; do
            name="$(jq -r '.name' <<<"$label")"
            enc="$(jq -rn --arg n "$name" '$n|@uri')"
            payload="$(jq -c '{name, color, description}' <<<"$label")"
            api_req PATCH "/labels/$enc" "$payload"
            if [ "$HTTP_CODE" = "404" ]; then
              api_req POST "/labels" "$payload"
              [ "$HTTP_CODE" = "201" ] || { echo "label create failed: $name ($HTTP_CODE)"; echo "$BODY"; exit 1; }
              echo "created: $name"
            elif [ "$HTTP_CODE" = "200" ]; then
              echo "updated: $name"
            else
              echo "label upsert failed: $name ($HTTP_CODE)"; echo "$BODY"; exit 1
            fi
          done

          # --- (b) Milestones: ensure by title ------------------------------
          echo "== Milestones =="
          ALL_MS="$(api_get_all "/milestones?state=all")"
          ensure_milestone() {
            local title="$1" num
            num="$(jq -r --arg t "$title" 'map(select(.title==$t))|.[0].number // empty' <<<"$ALL_MS")"
            if [ -z "$num" ]; then
              api_req POST "/milestones" "$(jq -nc --arg t "$title" '{title:$t}')"
              [ "$HTTP_CODE" = "201" ] || { echo "milestone create failed: $title ($HTTP_CODE)"; echo "$BODY"; exit 1; }
              ALL_MS="$(jq -c --argjson m "$BODY" '. + [$m]' <<<"$ALL_MS")"
              echo "created milestone: $title"
            else
              echo "milestone exists: $title (#$num)"
            fi
          }
          ensure_milestone "sprint-1 — woods to gate"
          ensure_milestone "sprint-2 — magic"

          # --- (c) Backlog: create issues idempotently by exact title -------
          echo "== Backlog =="
          ALL_ISSUES="$(api_get_all "/issues?state=all")"
          shopt -s nullglob
          for f in .github/backlog/*.md; do
            # Front matter = lines between the first two '---' fences.
            fm="$(awk 'BEGIN{n=0} /^---[[:space:]]*$/{n++; if(n==2) exit; next} n==1{print}' "$f")"
            # Body = everything after the second '---' fence.
            body="$(awk 'BEGIN{n=0} /^---[[:space:]]*$/{n++; next} n>=2{print}' "$f")"

            title="$(sed -n 's/^title:[[:space:]]*//p' <<<"$fm" | head -n1)"
            title="${title%\"}"; title="${title#\"}"
            ms_title="$(sed -n 's/^milestone:[[:space:]]*//p' <<<"$fm" | head -n1)"
            labels_raw="$(sed -n 's/^labels:[[:space:]]*//p' <<<"$fm" | head -n1)"
            labels_clean="${labels_raw#[}"; labels_clean="${labels_clean%]}"
            labels_json="$(jq -Rc 'split(",")|map(gsub("^\\s+|\\s+$";""))|map(select(length>0))' <<<"$labels_clean")"

            if [ -z "$title" ]; then
              echo "skip (no title): $f"; continue
            fi

            exists="$(jq --arg t "$title" 'map(select(.title==$t))|length' <<<"$ALL_ISSUES")"
            if [ "$exists" != "0" ]; then
              echo "exists, skipping: $title"; continue
            fi

            ms_num="$(jq -r --arg t "$ms_title" 'map(select(.title==$t))|.[0].number // empty' <<<"$ALL_MS")"
            if [ -n "$ms_title" ] && [ -z "$ms_num" ]; then
              echo "milestone not found for issue '$title': $ms_title"; exit 1
            fi

            payload="$(jq -nc --arg t "$title" --arg b "$body" --argjson l "$labels_json" --arg mn "$ms_num" \
              '{title:$t, body:$b, labels:$l} + (if $mn=="" then {} else {milestone:($mn|tonumber)} end)')"
            api_req POST "/issues" "$payload"
            [ "$HTTP_CODE" = "201" ] || { echo "issue create failed: $title ($HTTP_CODE)"; echo "$BODY"; exit 1; }
            ALL_ISSUES="$(jq -c --argjson i "$BODY" '. + [$i]' <<<"$ALL_ISSUES")"
            echo "created issue: $title"
          done
